name: MemlaApp
options:
  deploymentTarget:
    iOS: "18.0"
  minimumXcodeGenVersion: 2.38.0
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.yosazo.memla
    PRODUCT_NAME: Memla
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIRequiresFullScreen: NO
    INFOPLIST_KEY_NSLocalNetworkUsageDescription: Memla connects to your Mac on the local network to run private local scouting.
    INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsLocalNetworking: YES
    INFOPLIST_KEY_NSAppTransportSecurity_NSAllowsArbitraryLoads: YES
    INFOPLIST_KEY_CFBundleDisplayName: Memla
    INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
targets:
  MemlaApp:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        INFOPLIST_KEY_UIBackgroundModes:
          - fetch
    dependencies: []
    scheme:
      testTargets: []
