name: Build iOS App

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "ios/**"
      - ".github/workflows/build-ios.yml"

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/MemlaApp
        run: xcodegen generate

      - name: Build app for iPhone Simulator
        working-directory: ios/MemlaApp
        run: |
          xcodebuild \
            -project MemlaApp.xcodeproj \
            -scheme MemlaApp \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package build logs
        run: |
          mkdir -p ios-artifacts
          cp -R ~/Library/Developer/Xcode/DerivedData ios-artifacts/DerivedData

      - name: Upload iOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: memla-ios-build
          path: ios-artifacts
